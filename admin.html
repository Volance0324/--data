<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理员上传</title>
    <style>
        body{max-width:900px;margin:40px auto;font-family:Arial;padding:0 20px}
        .upload{border:2px dashed #42b983;padding:30px;text-align:center;border-radius:10px;margin-bottom:30px}
        button{background:#42b983;color:white;border:none;padding:10px 20px;border-radius:6px;margin-top:15px;cursor:pointer}
        .file-item{padding:12px;border:1px solid #eee;margin-bottom:8px;border-radius:6px}
        .del{background:#f56c6c;margin-left:10px}
    </style>
</head>
<body>
    <h2>📤 管理员文档上传</h2>
    <div class="upload">
        <input type="file" id="file" multiple accept=".txt,.pdf,.jpg,.png,.jpeg,.gif">
        <button onclick="upload()">开始上传</button>
    </div>
    <div id="list"></div>

    <script>
        const KEY = "docs_data";
        function get(){return JSON.parse(localStorage.getItem(KEY)||"[]")}
        function save(arr){localStorage.setItem(KEY,JSON.stringify(arr));render()}
        
        function upload(){
            let files = document.getElementById("file").files;
            if(!files.length){alert("请选文件");return}
            let list = get();
            for(let f of files){
                let reader = new FileReader();
                reader.onload = e=>{
                    list.push({
                        name:f.name, type:f.type,
                        url:e.target.result, time:new Date().toLocaleString()
                    });
                    save(list);
                }
                if(f.type.startsWith("image/")) reader.readAsDataURL(f);
                else if(f.type==="text/plain") reader.readAsText(f);
                else reader.readAsDataURL(f);
            }
            alert("上传成功！前端已自动更新");
            document.getElementById("file").value="";
        }

        function render(){
            let d=get(),h="";
            d.forEach((i,k)=>{
                h+=`<div class="file-item">${i.name} <button class="del" onclick="del(${k})">删除</button></div>`;
            })
            document.getElementById("list").innerHTML=h;
        }

        function del(k){
            let d=get();d.splice(k,1);save(d);
        }
        render();
    </script>
</body>
</html>
