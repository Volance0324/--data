<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理员后台 - 分区管理</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --color-bg-main: #d2e1f2;
            --color-bg-card: #f6f6f6;
            --color-text: #776773;
            --color-border: #d2e1f2;
            --color-btn: #776773;
            --color-btn-hover: #655761;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Microsoft Yahei, sans-serif;
        }
        body {
            background: var(--color-bg-main);
            color: var(--color-text);
            padding: 20px;
        }
        h3 {
            color: var(--color-text);
            margin: 15px 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--color-bg-card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .upload-box{
            border:2px dashed var(--color-border);
            padding:20px;
            text-align:center;
            border-radius:8px;
            margin:15px 0;
        }
        input[type="file"], input[type="password"]{
            width:100%;
            padding:10px;
            margin:8px 0;
            border:1px solid var(--color-border);
            border-radius:6px;
        }
        button {
            background: var(--color-btn);
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin:5px 3px;
        }
        button:hover {
            background: var(--color-btn-hover);
        }
        .list {
            margin-top: 20px;
        }
        .good {
            background: #fff;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid var(--color-border);
        }
        .tip{
            font-size:13px;
            color:#999;
            margin:10px 0;
            text-align:center;
        }
        .lock-screen{
            position:fixed;top:0;left:0;width:100%;height:100%;
            background:var(--color-bg-main);
            display:flex;align-items:center;justify-content:center;z-index:9999;
        }
        .lock-box{
            background:var(--color-bg-card);padding:30px;border-radius:12px;text-align:center;width:300px;
        }
        .section-title{
            font-size:16px;
            font-weight:bold;
            margin:20px 0 10px;
            text-align:center;
            color:var(--color-dark);
        }
    </style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
    <div class="lock-box">
        <h3>🔒 管理员登录</h3>
        <input type="password" id="pwd" placeholder="输入管理员密码">
        <button onclick="login()">登录</button>
    </div>
</div>

<div class="container" id="main" style="display:none;">
    <h3>📂 数据上传管理后台</h3>

    <div class="section-title">一、上传到实时数据（公开）</div>
    <div class="upload-box">
        <input type="file" id="fileReal">
        <div class="tip">支持 log/txt/xlsx/图片 任意格式</div>
        <button onclick="uploadReal()">解析存入实时数据</button>
    </div>

    <div class="section-title">二、上传到往期数据（加密需密码）</div>
    <div class="upload-box">
        <input type="file" id="fileOld">
        <div class="tip">上传历史日志，自动归入加密往期板块</div>
        <button onclick="uploadOld()">解析存入往期数据</button>
    </div>

    <div class="section-title">三、数据列表管理</div>
    <div class="list" id="list"></div>
</div>

<script>
// 密码配置
const ADMIN_PASS = "admin123";     // 管理员后台密码
const OLD_DATA_PASS = "666888";    // 往期数据查看独立密码

const KEY_REAL = "realData";
const KEY_OLD = "oldData";

// 读写
function getReal(){return JSON.parse(localStorage.getItem(KEY_REAL)||"[]");}
function saveReal(arr){localStorage.setItem(KEY_REAL,JSON.stringify(arr));renderAll();}
function getOld(){return JSON.parse(localStorage.getItem(KEY_OLD)||"[]");}
function saveOld(arr){localStorage.setItem(KEY_OLD,JSON.stringify(arr));renderAll();}

// 管理员登录
function login(){
    let v = document.getElementById("pwd").value;
    if(v === ADMIN_PASS){
        document.getElementById("lockScreen").style.display = "none";
        document.getElementById("main").style.display = "block";
        renderAll();
    }else{
        alert("管理员密码错误");
    }
}

// 解析文本通用方法
function parseText(content){
    let lines = content.split(/\r?\n/);
    let res = [];
    lines.forEach(line=>{
        line = line.trim();
        if(!line) return;
        let m = line.match(/(\d{4}.*?\d{2}:\d{2}:\d{2}).*?\[(.+?)\].*?(团体签售|团体)/);
        if(m){
            res.push({
                team:"团体签售",
                plat:"日志",
                type:m[2],
                lock:false
            });
        }
    });
    return res;
}

// 上传实时
function uploadReal(){
    let f = document.getElementById("fileReal").files[0];
    if(!f){alert("请选择文件");return;}
    let name = f.name;

    if(name.match(/\.(xlsx|xls)$/i)){
        let r = new FileReader();
        r.readAsArrayBuffer(f);
        r.onload = e=>{
            let wb = XLSX.read(new Uint8Array(e.target.result),{type:"array"});
            let json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            let d = getReal();
            json.forEach(i=>{
                d.push({team:i.团体||"未知",plat:i.平台||"日志",type:i.类型||"普通",lock:false});
            });
            saveReal(d);
            alert("实时数据导入成功："+json.length+"条");
        }
        return;
    }

    // log/txt/其他
    let r = new FileReader();
    r.readAsText(f);
    r.onload = e=>{
        let list = parseText(e.target.result);
        let d = getReal();
        d.push(...list);
        saveReal(d);
        alert("实时日志解析成功："+list.length+"条");
    }
}

// 上传往期
function uploadOld(){
    let f = document.getElementById("fileOld").files[0];
    if(!f){alert("请选择文件");return;}
    let name = f.name;

    if(name.match(/\.(xlsx|xls)$/i)){
        let r = new FileReader();
        r.readAsArrayBuffer(f);
        r.onload = e=>{
            let wb = XLSX.read(new Uint8Array(e.target.result),{type:"array"});
            let json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            let d = getOld();
            json.forEach(i=>{
                d.push({team:i.团体||"未知",plat:i.平台||"日志",type:i.类型||"普通",lock:false});
            });
            saveOld(d);
            alert("往期数据导入成功："+json.length+"条");
        }
        return;
    }

    let r = new FileReader();
    r.readAsText(f);
    r.onload = e=>{
        let list = parseText(e.target.result);
        let d = getOld();
        d.push(...list);
        saveOld(d);
        alert("往期日志解析成功："+list.length+"条");
    }
}

// 渲染全部
function renderAll(){
    let real = getReal();
    let old = getOld();
    let html = "";

    html += `<div class="section-title">📊 实时数据 共${real.length}条</div>`;
    real.forEach((it,i)=>{
        html += `
        <div class="good">
            <div>团体：${it.team}</div>
            <div>平台：${it.plat}</div>
            <div>类型：${it.type}</div>
            <button class="del" onclick="delReal(${i})">删除</button>
        </div>`;
    });

    html += `<div class="section-title">📁 往期加密数据 共${old.length}条</div>`;
    old.forEach((it,i)=>{
        html += `
        <div class="good">
            <div>团体：${it.team}</div>
            <div>平台：${it.plat}</div>
            <div>类型：${it.type}</div>
            <button class="del" onclick="delOld(${i})">删除</button>
        </div>`;
    });

    document.getElementById("list").innerHTML = html;
}

function delReal(i){
    if(!confirm("确定删除？"))return;
    let d = getReal();
    d.splice(i,1);
    saveReal(d);
}
function delOld(i){
    if(!confirm("确定删除？"))return;
    let d = getOld();
    d.splice(i,1);
    saveOld(d);
}
</script>
</body>
</html>
