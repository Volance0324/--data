<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理员后台 - 签售链接管理</title>
    <style>
        :root {
            --color-bg-main: #d2e1f2;    /* 浅蓝背景 */
            --color-bg-card: #f6f6f6;   /* 白色卡片 */
            --color-text: #776773;      /* 深灰紫文字 */
            --color-border: #d2e1f2;    /* 边框用浅蓝 */
            --color-btn: #776773;       /* 按钮主色 */
            --color-btn-hover: #655761; /* 按钮 hover 加深 */
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Microsoft Yahei, sans-serif;
        }
        body {
            background: var(--color-bg-main);
            color: var(--color-text);
            padding: 20px;
        }
        h3 {
            color: var(--color-text);
            margin-bottom: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--color-bg-card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .list {
            margin-top: 10px;
        }
        .good {
            background: #fff;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid var(--color-border);
            word-break: break-all;
        }
        .del {
            background: #c47c7c;
            color: #fff;
            border: none;
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 8px;
        }
        .empty-tip {
            text-align: center;
            color: #aaa;
            padding: 30px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h3>管理员后台 - 签售链接管理</h3>
        <div class="list" id="list"></div>
    </div>

    <script>
        function getData(){
            return JSON.parse(localStorage.getItem("goodsData")||"[]")
        }
        function save(d){
            localStorage.setItem("goodsData",JSON.stringify(d))
        }

        function render(){
            let d=getData()
            let h=""
            if(d.length===0){
                h = `<div class="empty-tip">暂无商品数据</div>`;
            }else{
                d.forEach((it,i)=>{
                    h+=`<div class="good">
                        <div style="font-weight:bold;color:var(--color-text);margin-bottom:4px;">[${it.plat}] ${it.type}</div>
                        <div style="font-size:13px;color:#777;word-break:break-all;">${it.link}</div>
                        <button class="del" onclick="del(${i})">删除</button>
                    </div>`
                })
            }
            document.getElementById("list").innerHTML=h
        }

        function del(i){
            if(!confirm("确定要删除这条商品吗？")) return;
            let d=getData()
            d.splice(i,1)
            save(d)
            render()
        }
        render()
    </script>
</body>
</html>
