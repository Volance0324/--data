<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理员后台</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --color-bg-main: #d2e1f2;
            --color-bg-card: #f6f6f6;
            --color-text: #776773;
            --color-border: #d2e1f2;
            --color-btn: #776773;
            --color-btn-hover: #655761;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Microsoft Yahei, sans-serif;
        }
        body {
            background: var(--color-bg-main);
            color: var(--color-text);
            padding: 20px;
        }
        h3 {
            margin: 15px 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--color-bg-card);
            border-radius: 12px;
            padding: 20px;
        }
        .upload-box{
            border:2px dashed var(--color-border);
            padding:20px;
            text-align:center;
            border-radius:8px;
            margin:15px 0;
        }
        input[type="file"], input[type="password"]{
            width:100%;
            padding:10px;
            margin:8px 0;
            border:1px solid var(--color-border);
            border-radius:6px;
        }
        button {
            background: var(--color-btn);
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size:13px;
        }
        button:hover{
            background: var(--color-btn-hover);
        }
        .btn-del{
            background:#c47c7c;
        }
        .btn-rename{
            background:#6799cc;
            margin-right:5px;
        }
        .btn-batch{
            background:#e74c3c;
            margin-left:10px;
        }
        .btn-batch:disabled{
            opacity:0.5;
            cursor:not-allowed;
        }
        .top-bar{
            display:flex;
            align-items:center;
            gap:15px;
            margin-bottom:15px;
        }
        .list {
            margin-top: 10px;
        }
        .good {
            background: #fff;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid var(--color-border);
            display:flex;
            flex-direction:column;
            gap:8px;
        }
        .item-row{
            display:flex;
            align-items:center;
            gap:10px;
            flex-wrap:wrap;
        }
        .name-text{
            flex:1;
        }
        .tip{
            font-size:13px;
            color:#999;
            margin:10px 0;
            text-align:center;
        }
        .lock-screen{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:var(--color-bg-main);
            display:flex;
            align-items:center;
            justify-content:center;
            z-index:9999;
        }
        .lock-box{
            background:var(--color-bg-card);
            padding:30px;
            border-radius:12px;
            text-align:center;
            width:300px;
        }
        .section-title{
            font-size:16px;
            font-weight:bold;
            margin:20px 0 10px;
            text-align:center;
        }
        .radio-line{
            display:flex;
            gap:15px;
            align-items:center;
        }
    </style>
</head>
<body>
<div class="lock-screen" id="lockScreen">
    <div class="lock-box">
        <h3>🔒 管理员登录</h3>
        <input type="password" id="pwd" placeholder="输入管理员密码">
        <button onclick="login()">登录</button>
    </div>
</div>

<div class="container" id="main" style="display:none;">
    <h3>📂 数据管理后台</h3>

    <div class="section-title">一、上传实时数据（固定公开）</div>
    <div class="upload-box">
        <input type="file" id="fileReal">
        <div class="tip">log/txt 任意格式 一个文件只算1条，不拆分多行</div>
        <button onclick="uploadReal()">解析导入</button>
    </div>

    <div class="section-title">二、上传往期数据</div>
    <div class="upload-box">
        <input type="file" id="fileOld">
        <div class="tip">上传只生成1条，默认公开，支持自定义改名</div>
        <button onclick="uploadOld()">解析导入往期</button>
    </div>

    <div class="section-title">三、数据列表管理</div>

    <!-- 全选 + 批量删除按钮 -->
    <div class="top-bar">
        <label><input type="checkbox" id="checkAll"> 全选所有</label>
        <button class="btn-batch" id="batchDelBtn" disabled onclick="batchDeleteAll()">🗑 批量删除选中</button>
    </div>

    <div class="list" id="list"></div>
</div>

<script>
const ADMIN_PASS = "6666";
const KEY_REAL = "realData";
const KEY_OLD = "oldData";

let realCheck = [];
let oldCheck = [];

function getReal(){
    return JSON.parse(localStorage.getItem(KEY_REAL)||"[]");
}
function saveReal(arr){
    localStorage.setItem(KEY_REAL,JSON.stringify(arr));
    renderAll();
}
function getOld(){
    return JSON.parse(localStorage.getItem(KEY_OLD)||"[]");
}
function saveOld(arr){
    localStorage.setItem(KEY_OLD,JSON.stringify(arr));
    renderAll();
}

function login(){
    let v = document.getElementById("pwd").value;
    if(v === ADMIN_PASS){
        document.getElementById("lockScreen").style.display = "none";
        document.getElementById("main").style.display = "block";
        renderAll();
    }else{
        alert("密码错误");
    }
}

function readFileToItem(file, cb){
    let reader = new FileReader();
    reader.onload = function(e){
        let item = {
            name: file.name,
            content: e.target.result,
            lock: false
        };
        cb(item);
    };
    reader.readAsText(file);
}

function uploadReal(){
    let f = document.getElementById("fileReal").files[0];
    if(!f){
        alert("请先选择文件");
        return;
    }
    readFileToItem(f, function(item){
        let arr = getReal();
        arr.push(item);
        saveReal(arr);
        alert("上传成功，仅生成1条，不拆分");
    });
}

function uploadOld(){
    let f = document.getElementById("fileOld").files[0];
    if(!f){
        alert("请先选择文件");
        return;
    }
    readFileToItem(f, function(item){
        let arr = getOld();
        arr.push(item);
        saveOld(arr);
        alert("往期上传成功，仅生成1条，默认公开");
    });
}

function setOldLock(index, val){
    let arr = getOld();
    arr[index].lock = val;
    saveOld(arr);
}

// 改名
function startRename(type, idx){
    let arr = type === 'real' ? getReal() : getOld();
    let newName = prompt("请输入自定义名称：", arr[idx].name);
    if(newName && newName.trim() !== ""){
        arr[idx].name = newName.trim();
        type === 'real' ? saveReal(arr) : saveOld(arr);
    }
}

// 单条删除
function delReal(idx){
    if(!realCheck[idx]){
        alert("请先勾选本条再删除");
        return;
    }
    if(!confirm("确定删除？"))return;
    let arr = getReal();
    arr.splice(idx,1);
    saveReal(arr);
}
function delOld(idx){
    if(!oldCheck[idx]){
        alert("请先勾选本条再删除");
        return;
    }
    if(!confirm("确定删除？"))return;
    let arr = getOld();
    arr.splice(idx,1);
    saveOld(arr);
}

// 全选事件
document.getElementById("checkAll").addEventListener("change",function(){
    let all = this.checked;
    realCheck.fill(all);
    oldCheck.fill(all);
    renderAll();
});

// 更新批量按钮状态
function updateBatchBtn(){
    let has = realCheck.some(x=>x) || oldCheck.some(x=>x);
    document.getElementById("batchDelBtn").disabled = !has;
}

// 批量删除所有选中
function batchDeleteAll(){
    if(!confirm("确定删除所有勾选的数据？"))return;

    let realArr = getReal().filter((_,i)=>!realCheck[i]);
    let oldArr = getOld().filter((_,i)=>!oldCheck[i]);

    localStorage.setItem(KEY_REAL,JSON.stringify(realArr));
    localStorage.setItem(KEY_OLD,JSON.stringify(oldArr));

    renderAll();
}

function renderAll(){
    let real = getReal();
    let old = getOld();

    realCheck = new Array(real.length).fill(false);
    oldCheck = new Array(old.length).fill(false);

    let html = "";

    html += `<div class="section-title">📊 实时数据 共${real.length}条</div>`;
    real.forEach((item,i)=>{
        html += `
        <div class="good">
            <div class="item-row">
                <input type="checkbox" onchange="realCheck[${i}]=this.checked;updateBatchBtn()">
                <span class="name-text">📄 ${item.name}</span>
                <button class="btn-rename" onclick="startRename('real',${i})">✏️改名</button>
                <button class="btn-del" onclick="delReal(${i})">删除</button>
            </div>
        </div>`;
    });

    html += `<div class="section-title">📁 往期数据 共${old.length}条</div>`;
    old.forEach((item,i)=>{
        html += `
        <div class="good">
            <div class="item-row">
                <input type="checkbox" onchange="oldCheck[${i}]=this.checked;updateBatchBtn()">
                <span class="name-text">📄 ${item.name}</span>
                <button class="btn-rename" onclick="startRename('old',${i})">✏️改名</button>
                <button class="btn-del" onclick="delOld(${i})">删除</button>
            </div>
            <div class="radio-line">
                <label><input type="radio" name="lock${i}" onchange="setOldLock(${i},false)" ${!item.lock?'checked':''}> 公开</label>
                <label><input type="radio" name="lock${i}" onchange="setOldLock(${i},true)" ${item.lock?'checked':''}> 加密</label>
            </div>
        </div>`;
    });

    document.getElementById("list").innerHTML = html;
    updateBatchBtn();
}
</script>
</body>
</html>
