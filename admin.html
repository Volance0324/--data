<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理员后台 - 权限管理</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --color-bg-main: #d2e1f2;
            --color-bg-card: #f6f6f6;
            --color-text: #776773;
            --color-border: #d2e1f2;
            --color-btn: #776773;
            --color-btn-hover: #655761;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Microsoft Yahei, sans-serif;
        }
        body {
            background: var(--color-bg-main);
            color: var(--color-text);
            padding: 20px;
        }
        h3 {
            color: var(--color-text);
            margin-bottom: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--color-bg-card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .upload-box{
            border:2px dashed var(--color-border);
            padding:20px;
            text-align:center;
            border-radius:8px;
            margin:15px 0;
        }
        input[type="file"], input[type="password"]{
            width:100%;
            padding:10px;
            margin:8px 0;
            border:1px solid var(--color-border);
            border-radius:6px;
        }
        button {
            background: var(--color-btn);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin:5px;
        }
        button:hover {
            background: var(--color-btn-hover);
        }
        .list {
            margin-top: 30px;
        }
        .good {
            background: #fff;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid var(--color-border);
        }
        .del {
            background: #c47c7c;
            font-size:12px;
            padding:4px 8px;
            border-radius:4px;
            margin-top:8px;
        }
        .lock{
            background: #e8a7b1;
            font-size:12px;
            padding:4px 8px;
            border-radius:4px;
            margin-top:8px;
        }
        .tip{
            font-size:13px;
            color:#999;
            margin:10px 0;
            text-align:center;
        }
        .lock-screen{
            position:fixed;top:0;left:0;width:100%;height:100%;
            background:var(--color-bg-main);
            display:flex;align-items:center;justify-content:center;z-index:9999;
        }
        .lock-box{
            background:var(--color-bg-card);padding:30px;border-radius:12px;text-align:center;width:300px;
        }
    </style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
    <div class="lock-box">
        <h3>🔒 管理员登录</h3>
        <input type="password" id="pwd" placeholder="输入管理员密码">
        <button onclick="login()">登录</button>
    </div>
</div>

<div class="container" id="main" style="display:none;">
    <h3>📂 文件上传 & 权限管理</h3>
    <div class="upload-box">
        <input type="file" id="file" accept=".xlsx,.xls,.log,.txt,.png,.jpg,.jpeg">
        <div class="tip">支持：Excel / log / txt / 图片</div>
        <button onclick="upload()">解析并导入</button>
    </div>

    <div class="list" id="list"></div>
</div>

<script>
// ========== 管理员密码 ==========
const ADMIN_PASS = "admin123";
// ========== 内容查看密码（给客户的） ==========
const CONTENT_PASS = "123456";

const KEY = "goodsData";

function getData(){
    return JSON.parse(localStorage.getItem(KEY)||"[]");
}
function save(d){
    localStorage.setItem(KEY,JSON.stringify(d));
    render();
}

function login(){
    let v = document.getElementById("pwd").value;
    if(v === ADMIN_PASS){
        document.getElementById("lockScreen").style.display = "none";
        document.getElementById("main").style.display = "block";
        render();
    }else{
        alert("密码错误");
    }
}

function upload(){
    let f = document.getElementById("file").files[0];
    if(!f){alert("请选择文件");return}
    let n = f.name;

    if(n.match(/\.(jpg|png|jpeg)$/i)){
        let r = new FileReader();
        r.readAsDataURL(f);
        r.onload = e=>{
            let d = getData();
            d.push({team:"图片",plat:"图片",type:"图片",lock:false});
            save(d);
            alert("上传成功");
        }
        return;
    }

    if(n.match(/\.(xlsx|xls)$/i)){
        let r = new FileReader();
        r.readAsArrayBuffer(f);
        r.onload = e=>{
            let wb = XLSX.read(new Uint8Array(e.target.result),{type:"array"});
            let data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            let d = getData();
            data.forEach(i=>{
                d.push({
                    team:i.团体||i.team||"未知",
                    plat:i.平台||i.plat||"未知",
                    type:i.类型||i.type||"线上签售",
                    lock:false
                });
            });
            save(d);
            alert("导入成功："+data.length+"条");
        }
        return;
    }

    if(n.match(/\.(log|txt)$/i)){
        let r = new FileReader();
        r.readAsText(f);
        r.onload = e=>{
            let t = e.target.result;
            let lines = t.split(/\r?\n/);
            let d = getData();
            let cnt = 0;
            lines.forEach(line=>{
                line = line.trim();
                if(!line) return;
                let m = line.match(/(\d{4}.*?\d{2}:\d{2}:\d{2}).*?\[(.+?)\].*?团体签售/);
                if(m){
                    d.push({
                        team:"团体签售",
                        plat:"日志",
                        type:m[2]||"无变动",
                        lock:false
                    });
                    cnt++;
                }
            });
            save(d);
            alert("日志解析成功："+cnt+"条");
        }
    }
}

function render(){
    let d = getData();
    let html = "";
    d.forEach((it,i)=>{
        html+=`
        <div class="good">
            <div>团体：${it.team}</div>
            <div>平台：${it.plat}</div>
            <div>类型：${it.type}</div>
            <div>状态：${it.lock?"🔒 已上锁":"✅ 公开"}</div>
            <button class="del" onclick="del(${i})">删除</button>
            <button class="lock" onclick="toggleLock(${i})">${it.lock?"解锁":"上锁"}</button>
        </div>`;
    });
    document.getElementById("list").innerHTML = html || '<div class="tip">暂无数据</div>';
}

function del(i){
    if(!confirm("确定删除？"))return;
    let d = getData();
    d.splice(i,1);
    save(d);
}

function toggleLock(i){
    let d = getData();
    d[i].lock = !d[i].lock;
    save(d);
}
</script>
</body>
</html>
