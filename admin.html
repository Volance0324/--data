<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理员后台 - 文档表格上传管理</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --color-bg-main: #d2e1f2;
            --color-bg-card: #f6f6f6;
            --color-text: #776773;
            --color-border: #d2e1f2;
            --color-btn: #776773;
            --color-btn-hover: #655761;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Microsoft Yahei, sans-serif;
        }
        body {
            background: var(--color-bg-main);
            color: var(--color-text);
            padding: 20px;
        }
        h3 {
            color: var(--color-text);
            margin-bottom: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--color-bg-card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .upload-box{
            border:2px dashed var(--color-border);
            padding:20px;
            text-align:center;
            border-radius:8px;
            margin:15px 0;
        }
        input[type="file"]{
            width:100%;
            padding:8px;
        }
        button {
            background: var(--color-btn);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin:5px 0;
        }
        button:hover {
            background: var(--color-btn-hover);
        }
        .list {
            margin-top: 30px;
        }
        .good {
            background: #fff;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid var(--color-border);
        }
        .del {
            background: #c47c7c;
            color: #fff;
            border: none;
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-top:8px;
        }
        .tip{
            font-size:13px;
            color:#999;
            margin:10px 0;
            text-align:center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h3>管理员 - 表格/图片上传导入</h3>

        <div class="upload-box">
            <input type="file" id="fileUpload" accept=".xlsx,.xls,.jpg,.png,.jpeg">
            <div class="tip">支持Excel表格 / 图片上传<br>表格格式：团体、平台、类型</div>
            <button onclick="handleUpload()">解析并导入</button>
        </div>

        <div class="list" id="list"></div>
    </div>

    <script>
        const KEY = "goodsData";
        // 获取数据
        function getData(){
            return JSON.parse(localStorage.getItem(KEY)||"[]");
        }
        // 保存数据
        function save(arr){
            localStorage.setItem(KEY,JSON.stringify(arr));
            renderList();
        }

        // 上传处理
        function handleUpload(){
            let file = document.getElementById("fileUpload").files[0];
            if(!file){
                alert("请先选择文件");
                return;
            }
            let name = file.name;
            // 图片直接存
            if(name.match(/jpg|png|jpeg/i)){
                let reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function(e){
                    let arr = getData();
                    arr.push({
                        team:"图片素材",
                        plat:"图片",
                        type:"图片",
                        img:e.target.result
                    });
                    save(arr);
                    alert("图片上传成功，前端已更新");
                }
                return;
            }
            // Excel解析
            if(name.match(/xlsx|xls/i)){
                let reader = new FileReader();
                reader.readAsArrayBuffer(file);
                reader.onload = function(e){
                    let data = new Uint8Array(e.target.result);
                    let workbook = XLSX.read(data,{type:"array"});
                    let sheet = workbook.Sheets[workbook.SheetNames[0]];
                    let json = XLSX.utils.sheet_to_json(sheet);
                    
                    let arr = getData();
                    json.forEach(item=>{
                        arr.push({
                            team:item.团体||"未知团体",
                            plat:item.平台||"未知平台",
                            type:item.类型||"未知类型",
                        });
                    });
                    save(arr);
                    alert("表格解析导入成功！共导入"+json.length+"条");
                }
            }
        }

        // 渲染列表
        function renderList(){
            let d = getData();
            let html = "";
            if(d.length===0){
                html = '<div class="tip">暂无数据</div>';
            }else{
                d.forEach((it,i)=>{
                    html += `
                    <div class="good">
                        <div><strong>团体：</strong>${it.team}</div>
                        <div><strong>平台：</strong>${it.plat}</div>
                        <div><strong>类型：</strong>${it.type}</div>
                        <button class="del" onclick="delItem(${i})">删除</button>
                    </div>
                    `;
                });
            }
            document.getElementById("list").innerHTML = html;
        }

        // 删除单条
        function delItem(i){
            if(!confirm("确定删除？"))return;
            let d = getData();
            d.splice(i,1);
            save(d);
        }

        renderList();
    </script>
</body>
</html>
