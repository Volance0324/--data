<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#1e1e1e;color:#fff;font-family:Microsoft Yahei;padding:20px;}
        .login-box{max-width:400px;margin:50px auto;background:#252526;padding:25px;border-radius:12px;border:1px solid #333;}
        h2{text-align:center;color:#ff79c6;margin-bottom:20px;}
        input{width:100%;padding:12px;margin:10px 0;background:#333;border:1px solid #555;border-radius:6px;color:#fff;font-size:16px;}
        button{width:100%;padding:12px;background:#ff79c6;color:#111;border:none;border-radius:6px;font-size:16px;font-weight:bold;margin-top:10px;}
        .back{text-align:center;margin-top:15px;}
        .back a{color:#9cdcfe;text-decoration:none;}
    </style>
</head>
<body>
    <div class="login-box">
        <h2>管理员登录</h2>
        <input type="text" id="user" placeholder="账号">
        <input type="password" id="pwd" placeholder="密码">
        <button onclick="login()">登录</button>
        <div class="back"><a href="index.html">返回前台</a></div>
    </div>

    <script>
        function login(){
            let u = document.getElementById("user").value;
            let p = document.getElementById("pwd").value;
            if(u==="admin" && p==="123456"){
                localStorage.setItem("isLogin","yes");
                location.href="admin.html";
            }else{
                alert("账号或密码错误");
            }
        }
    </script>
</body>
</html>
