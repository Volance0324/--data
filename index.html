<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>四叶幸运通行证</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: Consolas, "Courier New", monospace;
            padding: 15px;
            line-height: 1.8;
        }
        .terminal-container {
            max-width: 1000px;
            margin: 0 auto;
            border: 1px solid #333;
            padding: 20px;
            background-color: #252526;
            border-radius: 12px;
        }
        .select-wrap {
            margin: 20px 0;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .select-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        select {
            padding: 8px 12px;
            background: #333;
            color: #ff79c6;
            border: 1px solid #555;
            border-radius: 4px;
            font-size: 15px;
            font-family: inherit;
        }
        .divider {
            color: #6a9955;
            margin: 8px 0;
            text-align: center;
        }
        .lucky-slogan {
            color: #ff79c6;
            text-align: center;
            font-size: 18px;
            margin-bottom: 12px;
            font-weight: bold;
        }
        .status {
            color: #4ec9b0;
        }
        .info-text {
            color: #9cdcfe;
        }
        .time-text {
            color: #ce9178;
        }
        .platform-tag {
            color: #f92672;
            font-weight: bold;
        }
        .type-online {
            color: #8be9fd;
        }
        .type-offline {
            color: #ffb86c;
        }
        .sales-high {
            color: #ff79c6;
            font-weight: bold;
        }
        .log-line {
            margin: 6px 0;
            padding-left: 10px;
            border-left: 2px solid #333;
        }

        /* 手机端适配 */
        @media (max-width: 600px) {
            .select-wrap {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .lucky-slogan {
                font-size: 16px;
            }
            body {
                padding: 10px;
            }
            .terminal-container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="terminal-container">
        <div class="divider">====================================================</div>
        <div class="lucky-slogan" id="luckyText">下单必中 权重爆棚</div>
        <div class="divider">====================================================</div>

        <div class="select-wrap">
            <div class="select-item">
                <span class="info-text">选择平台：</span>
                <select id="platformSel">
                    <option value="ALL">全部平台</option>
                    <option value="ktown4u">ktown4u</option>
                    <option value="iminitv">iminitv</option>
                    <option value="fanme">fanme</option>
                    <option value="kmonstarorg">kmonstarorg</option>
                    <option value="kmonstatw">kmonstatw</option>
                    <option value="kmonstartw">kmonstartw</option>
                    <option value="itta">itta</option>
                    <option value="musicndrama">musicndrama</option>
                    <option value="beatroad">beatroad</option>
                    <option value="mokket">mokket</option>
                </select>
            </div>
            <div class="select-item">
                <span class="info-text">类型：线上/线下/合影</span>
                <select id="typeSel">
                    <option value="ALL">全部</option>
                    <option value="线上合影">线上合影</option>
                    <option value="线下合影">线下合影</option>
                </select>
            </div>
            <div class="select-item">
                <span class="info-text">刷新间隔：</span>
                <select id="refreshSel">
                    <option value="10000">10秒</option>
                    <option value="30000" selected>30秒</option>
                    <option value="60000">1分钟</option>
                </select>
            </div>
        </div>

        <div class="log-line"><span class="status">✅ 面板状态：</span>正常运行</div>
        <div class="log-line"><span class="info-text">🕒 最后更新：</span><span class="time-text" id="lastUpdate">--</span></div>

        <div class="divider">====================================================</div>
        <div class="info-text" style="text-align:center;"> 签售销量数据列表 </div>
        <div class="divider">====================================================</div>

        <div id="logArea"></div>
    </div>

    <script>
        let allData = [];
        let refreshTimer = null;

        const luckyWords = [
            "买的全中 好运拉满",
            "下单必中 权重爆棚",
            "四叶加持 次次都中",
            "只要下单 绝不落空",
            "签售稳稳中 运气一直红",
            "全网最优权重 买啥都能中",
            "幸运通关 每单必中",
            "一路全中 接单无忧"
        ];

        function setLuckySlogan() {
            const today = new Date().toDateString();
            const seed = today.charCodeAt(0) + today.charCodeAt(4) + today.charCodeAt(9);
            const idx = seed % luckyWords.length;
            document.getElementById('luckyText').innerText = luckyWords[idx];
        }

        function loadCSV() {
            fetch('data.csv')
                .then(res => res.text())
                .then(text => {
                    allData = text.trim().split('\n');
                    renderData();
                    const now = new Date().toLocaleString();
                    document.getElementById('lastUpdate').textContent = now;
                })
                .catch(() => {
                    document.getElementById('logArea').innerHTML = 
                    '<div class="log-line" style="color:#ff6b6b;">⚠️ 读取数据失败，请检查data.csv文件</div>';
                });
        }

        function renderData() {
            let selPlatform = document.getElementById('platformSel').value;
            let selType = document.getElementById('typeSel').value;
            let area = document.getElementById('logArea');
            area.innerHTML = '';

            for(let i=1; i<allData.length; i++){
                let arr = allData[i].split(',');
                if(arr.length < 4) continue;

                let p = arr[0];
                let kind = arr[1];
                let sales = arr[2];
                let time = arr[3];

                if(selPlatform !== 'ALL' && p !== selPlatform) continue;
                if(selType !== 'ALL' && kind !== selType) continue;

                let typeClass = kind === '线上合影' ? 'type-online' : 'type-offline';
                let line = `
                <div class="log-line">
                    <span class="platform-tag">[${p}]</span>
                    <span class="${typeClass}">${kind}</span>
                    销量：<span class="sales-high">${sales}</span>
                    记录时间：<span class="time-text">${time}</span>
                </div>
                `;
                area.innerHTML += line;
            }
        }

        function setRefresh() {
            if(refreshTimer) clearInterval(refreshTimer);
            let gap = parseInt(document.getElementById('refreshSel').value);
            refreshTimer = setInterval(loadCSV, gap);
        }

        document.getElementById('platformSel').addEventListener('change', renderData);
        document.getElementById('typeSel').addEventListener('change', renderData);
        document.getElementById('refreshSel').addEventListener('change', setRefresh);

        setLuckySlogan();
        loadCSV();
        setRefresh();
    </script>
</body>
</html>
