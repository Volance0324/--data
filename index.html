<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>四叶幸运通行证</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        :root {
            --color-dark: #968C83;
            --color-gray: #D6D2C4;
            --color-light: #FFF5EA;
            --color-pink: #F7DAD9;
            --color-highlight: #ffd6dd;
        }
        body{
            background: var(--color-light);
            color: var(--color-dark);
            font-family:Microsoft Yahei,Consolas;
            padding:10px;
            min-height: 100vh;
        }
        .box{
            max-width:100%;
            margin:0 auto;
            background:#fff;
            border:1px solid var(--color-gray);
            border-radius:12px;
            padding:15px;
            overflow-x:hidden;
        }
        .title{
            color: var(--color-dark);
            text-align:center;
            font-size:20px;
            font-weight:bold;
            margin-bottom:8px;
        }
        .line{
            margin:10px 0;
            border-bottom:2px dashed var(--color-pink);
        }
        .motto{
            color: var(--color-pink);
            text-align:center;
            font-size:17px;
            font-weight:bold;
            margin:8px 0;
        }
        .sel-wrap{
            display:flex;
            flex-wrap:wrap;
            gap:15px;
            justify-content:center;
            margin:15px 0;
        }
        .sel-item{
            display:flex;
            align-items:center;
            gap:6px;
        }
        .sel-item span{
            color: var(--color-dark);
            font-size:15px;
        }
        select{
            background: var(--color-light);
            color: var(--color-dark);
            border:1px solid var(--color-gray);
            border-radius:6px;
            padding:5px 8px;
            font-size:14px;
        }
        .info-row{
            margin:6px 0;
            padding-left:10px;
            border-left:2px solid var(--color-pink);
        }
        .goods-item{
            margin:8px 0;
            padding:10px;
            background: var(--color-light);
            border-radius:8px;
            word-break:break-all;
        }
        .log-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            cursor:pointer;
            font-weight:bold;
        }
        .log-content{
            margin-top:10px;
            padding:12px;
            background:#ffffff;
            border:1px solid var(--color-gray);
            border-radius:6px;
            white-space: pre-wrap;
            font-family: Consolas;
            font-size:13px;
            line-height:1.8;
            display:none;
        }
        .log-content.expanded{
            display:block;
        }
        .log-content .change-line{
            background-color: var(--color-highlight);
            padding:2px 4px;
            border-radius:3px;
        }
        .lock-area{
            padding:15px;
            background:#ffeef0;
            border-radius:8px;
            text-align:center;
            margin:10px 0;
        }
        input{
            width:100%;
            padding:10px;
            border-radius:6px;
            border:1px solid #ccc;
            margin:8px 0;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="line"></div>
        <div class="title">四叶幸运通行证</div>
        <div class="motto" id="motto"></div>
        <div class="line"></div>

        <div class="sel-wrap">
            <div class="sel-item">
                <span>平台：</span>
                <select id="plat">
                    <option value="全部">全部平台</option>
                    <option value="日志">日志</option>
                </select>
            </div>
            <div class="sel-item">
                <span>类型：</span>
                <select id="type">
                    <option value="全部">全部</option>
                    <option value="日志记录">日志记录</option>
                </select>
            </div>
            <div class="sel-item">
                <span>刷新间隔：</span>
                <select id="refreshSel">
                    <option value="10000">10秒</option>
                    <option value="30000" selected>30秒</option>
                    <option value="60000">1分钟</option>
                </select>
            </div>
        </div>

        <div class="info-row"><span style="color:#7A9E9F;">✅ 面板正常运行中</span></div>
        <div class="info-row"><span style="color:var(--color-dark);">🕒 自动实时刷新</span></div>

        <div class="line"></div>
        <div style="text-align:center;color:var(--color-dark);font-weight:bold;">实时数据（公开查看）</div>
        <div class="line"></div>
        <div id="realList"></div>

        <div class="line"></div>
        <div style="text-align:center;color:var(--color-dark);font-weight:bold;">往期历史数据</div>
        <div class="line"></div>

        <div id="lockArea" class="lock-area">
            <p>🔒 部分往期内容已加密，请输入密码解锁</p>
            <input type="password" id="pwdInput" placeholder="输入查看密码">
            <button onclick="unlockData()">解锁查看</button>
        </div>

        <div id="oldList"></div>
    </div>

<script>
    const mottoList = [
        "买的全中 好运拉满",
        "下单必中 权重爆棚",
        "四叶加持 次次都中",
        "只要下单 绝不落空"
    ];
    document.getElementById("motto").innerText = mottoList[0];

    const VIEW_PASS = "8888";
    let isUnlocked = false;
    let refreshTimer = null;

    function processLogContent(text){
        if (!text) return "暂无日志内容";
        let lines = text.split("\n");
        let processed = lines.map(line => {
            if(line.includes("[变动]")){
                return `<span class="change-line">${line}</span>`;
            }
            return line;
        });
        return processed.join("\n");
    }

    function toggleLog(index){
        const el = document.getElementById(`log-${index}`);
        if (el) {
            el.classList.toggle("expanded");
        }
    }

    function renderLogItem(item, index){
        const processedContent = processLogContent(item.content);
        return `
        <div class="goods-item">
            <div class="log-header" onclick="toggleLog('${index}')">
                <span>📄 ${item.name}</span>
                <span style="color:var(--color-pink);">点击查看详情 ↓</span>
            </div>
            <div class="log-content" id="log-${index}">${processedContent}</div>
        </div>`;
    }

    function renderRealData(){
        let arr = JSON.parse(localStorage.getItem("realData")||"[]");
        let html = "";
        if(arr.length <= 0){
            html = '<div style="text-align:center;color:#999;padding:20px;">暂无实时日志数据</div>';
        }else{
            arr.forEach((item, index)=>{
                html += renderLogItem(item, `real-${index}`);
            });
        }
        document.getElementById("realList").innerHTML = html;
    }

    function renderOldData(){
        let arr = JSON.parse(localStorage.getItem("oldData")||"[]");
        let html = "";
        if(arr.length <= 0){
            html = '<div style="text-align:center;color:#999;padding:20px;">暂无往期日志数据</div>';
        }else{
            arr.forEach((item, index)=>{
                if(item.lock && !isUnlocked){
                    html += `
                    <div class="goods-item" style="background:#ffeef0;">
                        🔒 「${item.name}」已加密，解锁后可查看原文
                    </div>`;
                }else{
                    html += renderLogItem(item, `old-${index}`);
                }
            });
        }
        document.getElementById("oldList").innerHTML = html;
    }

    function unlockData(){
        let pwd = document.getElementById("pwdInput").value.trim();
        if(pwd === VIEW_PASS){
            isUnlocked = true;
            document.getElementById("lockArea").style.display = "none";
            renderOldData();
            alert("✅ 解锁成功，已显示全部加密日志内容");
        }else{
            alert("❌ 密码错误");
        }
    }

    function initRefresh(){
        if(refreshTimer) clearInterval(refreshTimer);
        let t = parseInt(document.getElementById("refreshSel").value);
        refreshTimer = setInterval(()=>{
            renderRealData();
            renderOldData();
        }, t);
    }

    renderRealData();
    renderOldData();
    initRefresh();

    document.getElementById("refreshSel").onchange = initRefresh;
    document.getElementById("plat").onchange = function(){
        renderRealData();
        renderOldData();
    };
    document.getElementById("type").onchange = function(){
        renderRealData();
        renderOldData();
    };
</script>
</body>
</html>
