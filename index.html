<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>四叶幸运通行证</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#1e1e1e;color:#d4d4d4;font-family:Microsoft Yahei,Consolas;padding:10px;}
        .box{max-width:100%;margin:0 auto;background:#252526;border:1px solid #333;border-radius:12px;padding:15px;overflow-x:hidden;}
        .title{color:#ff79c6;text-align:center;font-size:20px;font-weight:bold;margin-bottom:8px;}
        .line{margin:10px 0;border-bottom:2px dashed #6a9955;}
        .motto{color:#ff79c6;text-align:center;font-size:17px;font-weight:bold;margin:8px 0;}
        .sel-wrap{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:15px 0;}
        .sel-item{display:flex;align-items:center;gap:6px;}
        .sel-item span{color:#9cdcfe;font-size:15px;}
        select{background:#333;color:#ff79c6;border:1px solid #555;border-radius:6px;padding:5px 8px;font-size:14px;}
        .info-row{margin:6px 0;padding-left:10px;border-left:2px solid #333;}
        .goods-item{margin:8px 0;padding:10px;background:#2c2c2c;border-radius:8px;word-break:break-all;}
        .platform{color:#f92672;font-weight:bold;}
        .type-online{color:#8be9fd;}
        .type-offline{color:#ffb86c;}
        .type-photo{color:#ff79c6;}
        .goods-item a{color:#9cdcfe;text-decoration:none;}
        .login-btn{text-align:center;margin:10px 0;}
        .login-btn a{color:#ff79c6;text-decoration:none;border:1px solid #ff79c6;padding:6px 12px;border-radius:6px;}

        @media (max-width:600px){
            body{padding:5px;}
            .box{padding:12px;}
            .sel-wrap{flex-direction:column;align-items:flex-start;gap:10px;}
            .sel-item{width:100%;justify-content:space-between;}
            select{width:60%;}
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="line"></div>
        <div class="title">四叶幸运通行证</div>
        <div class="motto" id="motto"></div>
        <div class="line"></div>

        <div class="sel-wrap">
            <div class="sel-item">
                <span>平台：</span>
                <select id="plat">
                    <option value="全部">全部平台</option>
                    <option value="ktown4u">ktown4u</option>
                    <option value="iminitv">iminitv</option>
                    <option value="fanme">fanme</option>
                    <option value="itta">itta</option>
                    <option value="musicndrama">musicndrama</option>
                    <option value="beatroad">beatroad</option>
                    <option value="mokket">mokket</option>
                </select>
            </div>
            <div class="sel-item">
                <span>类型：</span>
                <select id="type">
                    <option value="全部">全部</option>
                    <option value="线上签售">线上签售</option>
                    <option value="线下签售">线下签售</option>
                    <option value="合影">合影</option>
                </select>
            </div>
            <div class="sel-item">
                <span>刷新间隔：</span>
                <select id="refresh">
                    <option value="10000">10秒</option>
                    <option value="30000" selected>30秒</option>
                    <option value="60000">1分钟</option>
                </select>
            </div>
        </div>

        <div class="info-row"><span style="color:#4ec9b0;">✅ 面板状态：正常运行</span></div>
        <div class="info-row"><span style="color:#9cdcfe;">🕒 自动刷新中</span></div>

        <div class="line"></div>
        <div style="text-align:center;color:#9cdcfe;">签售商品列表</div>
        <div class="line"></div>

        <div id="list"></div>

        <div class="login-btn">
            <a href="login.html">管理员登录</a>
        </div>
    </div>

    <script>
        const mottoList = [
            "买的全中 好运拉满",
            "下单必中 权重爆棚",
            "四叶加持 次次都中",
            "只要下单 绝不落空"
        ];
        const today = new Date().toDateString();
        let idx = today.charCodeAt(0) % mottoList.length;
        document.getElementById("motto").innerText = mottoList[idx];

        let goods = JSON.parse(localStorage.getItem("goodsData")) || [];

        function render(){
            let pVal = document.getElementById("plat").value;
            let tVal = document.getElementById("type").value;
            let html = "";
            goods.forEach(item=>{
                if(pVal!="全部" && item.plat!=pVal) return;
                if(tVal!="全部" && item.type!=tVal) return;
                html += `
                <div class="goods-item">
                    <div class="platform">[${item.plat}]</div>
                    <div class="${item.type=="线上签售"?"type-online":item.type=="线下签售"?"type-offline":"type-photo"}">${item.type}</div>
                    <div><a href="${item.link}" target="_blank">打开商品链接</a></div>
                </div>
                `;
            });
            document.getElementById("list").innerHTML = html||"<div style='text-align:center;color:#888;'>暂无商品</div>";
        }

        document.getElementById("plat").onchange = render;
        document.getElementById("type").onchange = render;

        let timer;
        function setRefresh(){
            clearInterval(timer);
            let t = parseInt(document.getElementById("refresh").value);
            timer = setInterval(()=>{
                goods = JSON.parse(localStorage.getItem("goodsData")) || [];
                render();
            },t);
        }
        document.getElementById("refresh").onchange = setRefresh;

        render();
        setRefresh();
    </script>
</body>
</html>
