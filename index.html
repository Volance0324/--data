<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多平台·最新下单团监控面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: Consolas, "Courier New", monospace;
            padding: 20px;
            line-height: 1.8;
        }
        .terminal-container {
            max-width: 1000px;
            margin: 0 auto;
            border: 1px solid #333;
            padding: 20px;
            background-color: #252526;
            border-radius: 6px;
        }
        .top-select-bar {
            margin-bottom: 15px;
        }
        select {
            padding: 6px 12px;
            background: #333;
            color: #ff79c6;
            border: 1px solid #555;
            border-radius: 4px;
            font-size: 16px;
            font-family: inherit;
        }
        .divider {
            color: #6a9955;
            margin: 8px 0;
        }
        .status {
            color: #4ec9b0;
        }
        .info-text {
            color: #9cdcfe;
        }
        .time-text {
            color: #ce9178;
        }
        .platform-tag {
            color: #f92672;
            font-weight: bold;
        }
        .group-name {
            color: #a6e22e;
            font-weight: bold;
        }
        .member-name {
            color: #8be9fd;
            font-weight: bold;
        }
        .order-status {
            color: #ffb86c;
            font-weight: bold;
        }
        .log-line {
            margin: 6px 0;
            padding-left: 10px;
            border-left: 2px solid #333;
        }
    </style>
</head>
<body>
    <div class="terminal-container">
        <div class="divider">====================================================</div>
        <div class="divider"> 📊 多平台·最新下单团监控面板 </div>
        <div class="divider">====================================================</div>

        <!-- 平台选择下拉框 -->
        <div class="top-select-bar">
            <span class="info-text">选择平台：</span>
            <select id="platformSel">
                <option value="ALL">全部平台</option>
                <option value="ktown4u">ktown4u</option>
                <option value="iminitv">iminitv</option>
                <option value="fanme">fanme</option>
                <option value="kmonstarorg">kmonstarorg</option>
                <option value="kmonstatw">kmonstatw</option>
                <option value="kmonstartw">kmonstartw</option>
                <option value="itta">itta</option>
                <option value="musicndrama">musicndrama</option>
                <option value="beatroad">beatroad</option>
                <option value="mokket">mokket</option>
            </select>
        </div>

        <div class="log-line"><span class="status">✅ 面板状态:</span> 运行中</div>
        <div class="log-line"><span class="status">🌐 数据接口:</span> 正常</div>
        <div class="log-line"><span class="info-text">🕒 最后更新:</span> <span class="time-text" id="lastUpdate">--</span></div>
        <div class="log-line"><span class="info-text">⏱️ 刷新间隔:</span> 30秒</div>

        <div class="divider">====================================================</div>
        <div class="info-text"> 最近下单团列表（按时间倒序）: </div>
        <div class="divider">====================================================</div>

        <div id="logArea"></div>
    </div>

    <script>
        let allOrders = [];

        // 加载CSV数据
        function loadCSV() {
            fetch('data.csv')
                .then(res => res.text())
                .then(text => {
                    const rows = text.trim().split('\n');
                    allOrders = rows;
                    renderOrders();
                    // 更新最后更新时间
                    const now = new Date().toLocaleString();
                    document.getElementById('lastUpdate').textContent = now;
                })
                .catch(err => {
                    document.getElementById('logArea').innerHTML = 
                        `<div class="log-line" style="color:#ff6b6b;">⚠️ 加载数据失败，请检查data.csv文件</div>`;
                });
        }

        // 渲染筛选后的订单数据
        function renderOrders() {
            const selectedPlatform = document.getElementById('platformSel').value;
            const logArea = document.getElementById('logArea');
            logArea.innerHTML = '';

            // 跳过表头，从第2行开始读取数据
            for (let i = 1; i < allOrders.length; i++) {
                const cells = allOrders[i].split(',');
                if (cells.length < 6) continue;

                const platform = cells[0];
                const group = cells[1];
                const member = cells[2];
                const orderTime = cells[3];
                const orderStatus = cells[4];
                const remark = cells[5];

                // 平台筛选
                if (selectedPlatform !== "ALL" && platform !== selectedPlatform) continue;

                // 生成订单行
                const line = `
                    <div class="log-line">
                        <span class="platform-tag">[${platform}]</span> 
                        <span class="group-name">团: ${group}</span> / 
                        <span class="member-name">成员: ${member}</span> | 
                        <span class="time-text">下单时间: ${orderTime}</span> - 
                        <span class="order-status">状态: ${orderStatus}</span> 
                        <span class="info-text">备注: ${remark}</span>
                    </div>
                `;
                logArea.innerHTML += line;
            }
        }

        // 监听平台选择变化
        document.getElementById('platformSel').addEventListener('change', renderOrders);

        // 页面加载时执行，每30秒自动刷新
        loadCSV();
        setInterval(loadCSV, 30000);
    </script>
</body>
</html>
