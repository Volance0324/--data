<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>四叶幸运通行证</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root {
            --color-dark: #968C83;
            --color-gray: #D6D2C4;
            --color-light: #FFF5EA;
            --color-pink: #F7DAD9;
        }
        body{
            background: var(--color-light);
            color: var(--color-dark);
            font-family:Microsoft Yahei,Consolas;
            padding:10px;
            min-height: 100vh;
        }
        .box{
            max-width:100%;
            margin:0 auto;
            background:#fff;
            border:1px solid var(--color-gray);
            border-radius:12px;
            padding:15px;
            overflow-x:hidden;
            min-height: calc(100vh - 20px);
        }
        .title{
            color: var(--color-dark);
            text-align:center;
            font-size:20px;
            font-weight:bold;
            margin-bottom:8px;
        }
        .line{
            margin:10px 0;
            border-bottom:2px dashed var(--color-pink);
        }
        .motto{
            color: var(--color-pink);
            text-align:center;
            font-size:17px;
            font-weight:bold;
            margin:8px 0;
        }
        .sel-wrap{
            display:flex;
            flex-wrap:wrap;
            gap:15px;
            justify-content:center;
            margin:15px 0;
        }
        .sel-item{
            display:flex;
            align-items:center;
            gap:6px;
        }
        .sel-item span{
            color: var(--color-dark);
            font-size:15px;
        }
        select{
            background: var(--color-light);
            color: var(--color-dark);
            border:1px solid var(--color-gray);
            border-radius:6px;
            padding:5px 8px;
            font-size:14px;
        }
        .info-row{
            margin:6px 0;
            padding-left:10px;
            border-left:2px solid var(--color-pink);
        }
        .goods-item{
            margin:8px 0;
            padding:10px;
            background: var(--color-light);
            border-radius:8px;
            word-break:break-all;
        }
        .platform{
            color: var(--color-dark);
            font-weight:bold;
        }
        .type-online{
            color: #7A9E9F;
        }
        .type-offline{
            color: #D4A373;
        }
        .type-photo{
            color: var(--color-pink);
        }

        .section{
            margin:30px 0;
        }
        .section h4{
            font-size:16px;
            margin-bottom:10px;
            padding-bottom:6px;
            border-bottom:2px dashed var(--color-pink);
        }
        .lock-area{
            padding:15px;
            background:#ffeef0;
            border-radius:8px;
            text-align:center;
            margin:10px 0;
        }
        input{
            width:100%;
            padding:10px;
            border-radius:6px;
            border:1px solid #ccc;
            margin:8px 0;
        }
        button{
            padding:8px 20px;
            background:var(--color-dark);
            color:#fff;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        @media (max-width:600px){
            body{padding:5px;}
            .box{padding:12px;}
            .sel-wrap{flex-direction:column;align-items:flex-start;gap:10px;}
            .sel-item{width:100%;justify-content:space-between;}
            select{width:60%;}
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="line"></div>
        <div class="title">四叶幸运通行证</div>
        <div class="motto" id="motto"></div>
        <div class="line"></div>

        <div class="sel-wrap">
            <div class="sel-item">
                <span>平台：</span>
                <select id="plat">
                    <option value="全部">全部平台</option>
                    <option value="ktown4u">ktown4u</option>
                    <option value="iminitv">iminitv</option>
                    <option value="fanme">fanme</option>
                    <option value="itta">itta</option>
                    <option value="musicndrama">musicndrama</option>
                    <option value="beatroad">beatroad</option>
                    <option value="mokket">mokket</option>
                    <option value="日志">日志</option>
                </select>
            </div>
            <div class="sel-item">
                <span>类型：</span>
                <select id="type">
                    <option value="全部">全部</option>
                    <option value="线上签售">线上签售</option>
                    <option value="线下签售">线下签售</option>
                    <option value="合影">合影</option>
                    <option value="无变动">无变动</option>
                    <option value="变动">变动</option>
                </select>
            </div>
            <div class="sel-item">
                <span>刷新间隔：</span>
                <select id="refresh">
                    <option value="10000">10秒</option>
                    <option value="30000" selected>30秒</option>
                    <option value="60000">1分钟</option>
                </select>
            </div>
        </div>

        <div class="info-row"><span style="color:#7A9E9F;">✅ 面板状态：正常运行</span></div>
        <div class="info-row"><span style="color:var(--color-dark);">🕒 自动刷新中</span></div>

        <div class="line"></div>
        <div style="text-align:center;color:var(--color-dark);">实时数据（公开查看）</div>
        <div class="line"></div>
        <div id="realList"></div>

        <div class="line"></div>
        <div style="text-align:center;color:var(--color-dark);">往期历史数据</div>
        <div class="line"></div>

        <div id="oldLockArea" class="lock-area">
            <p>🔒 部分内容已加密，请输入密码解锁查看</p>
            <input type="password" id="oldPwd" placeholder="输入往期数据查看密码">
            <button onclick="unlockOld()">解锁查看</button>
        </div>
        <div id="oldList"></div>
    </div>

<script>
    const mottoList = [
        "买的全中 好运拉满",
        "下单必中 权重爆棚",
        "四叶加持 次次都中",
        "只要下单 绝不落空"
    ];
    const today = new Date().toDateString();
    let idx = today.charCodeAt(0) % mottoList.length;
    document.getElementById("motto").innerText = mottoList[idx];

    const OLD_DATA_PASS = "8888";
    let oldUnlocked = false;

    function filterData(list, platVal, typeVal){
        return list.filter(it=>{
            let matchPlat = platVal === "全部" || it.plat === platVal;
            let matchType = typeVal === "全部" || it.type === typeVal;
            return matchPlat && matchType;
        });
    }

    function renderReal(){
        let plat = document.getElementById("plat").value;
        let type = document.getElementById("type").value;
        let data = JSON.parse(localStorage.getItem("realData")||"[]");
        let filtered = filterData(data, plat, type);
        let html = "";
        if(filtered.length === 0){
            html = "<div style='text-align:center;color:#ccc;padding:20px;'>暂无实时数据</div>";
        }else{
            filtered.forEach(it=>{
                let cls = "";
                if(it.type.includes("线上")) cls = "type-online";
                else if(it.type.includes("线下")) cls = "type-offline";
                else cls = "type-photo";
                html += `
                <div class="goods-item">
                    <div class="platform">[${it.plat}]</div>
                    <div class="${cls}">${it.type}</div>
                    <div style="margin-top:6px;">团体：${it.team}</div>
                </div>`;
            });
        }
        document.getElementById("realList").innerHTML = html;
    }

    function renderOld(){
        let data = JSON.parse(localStorage.getItem("oldData")||"[]");
        let html = "";
        if(data.length === 0){
            html = "<div style='text-align:center;color:#ccc;padding:20px;'>暂无往期数据</div>";
        }else{
            data.forEach(it=>{
                // 加密且未解锁：隐藏
                if(it.lock && !oldUnlocked){
                    html += `<div class="goods-item" style="background:#ffeef0;color:#a97c83;">🔒 本条内容已加密</div>`;
                }else{
                    let cls = it.type.includes("线上") ? "type-online" : it.type.includes("线下") ? "type-offline" : "type-photo";
                    html += `
                    <div class="goods-item">
                        <div class="platform">[${it.plat}]</div>
                        <div class="${cls}">${it.type}</div>
                        <div style="margin-top:6px;">团体：${it.team}</div>
                    </div>`;
                }
            });
        }
        document.getElementById("oldList").innerHTML = html;
    }

    function unlockOld(){
        let val = document.getElementById("oldPwd").value;
        if(val === OLD_DATA_PASS){
            oldUnlocked = true;
            document.getElementById("oldLockArea").style.display = "none";
            renderOld();
            alert("✅ 解锁成功，已显示全部加密内容");
        }else{
            alert("❌ 密码错误");
        }
    }

    renderReal();
    document.getElementById("plat").onchange = renderReal;
    document.getElementById("type").onchange = renderReal;

    let timer;
    function setAutoRefresh(){
        clearInterval(timer);
        let ms = parseInt(document.getElementById("refresh").value);
        timer = setInterval(()=>{
            renderReal();
            if(oldUnlocked) renderOld();
        }, ms);
    }
    setAutoRefresh();
    document.getElementById("refresh").onchange = setAutoRefresh;
</script>
</body>
</html>
