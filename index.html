<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>签售平台销量监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: Consolas, "Courier New", monospace;
            padding: 20px;
            line-height: 1.8;
        }
        .terminal-container {
            max-width: 1000px;
            margin: 0 auto;
            border: 1px solid #333;
            padding: 20px;
            background-color: #252526;
            border-radius: 6px;
        }
        .select-wrap {
            margin-bottom: 15px;
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }
        select {
            padding: 6px 12px;
            background: #333;
            color: #ff79c6;
            border: 1px solid #555;
            border-radius: 4px;
            font-size: 15px;
            font-family: inherit;
        }
        .divider {
            color: #6a9955;
            margin: 8px 0;
        }
        .status {
            color: #4ec9b0;
        }
        .info-text {
            color: #9cdcfe;
        }
        .time-text {
            color: #ce9178;
        }
        .platform-tag {
            color: #f92672;
            font-weight: bold;
        }
        .type-online {
            color: #8be9fd;
        }
        .type-offline {
            color: #ffb86c;
        }
        .sales-high {
            color: #ff79c6;
            font-weight: bold;
        }
        .log-line {
            margin: 6px 0;
            padding-left: 10px;
            border-left: 2px solid #333;
        }
    </style>
</head>
<body>
    <div class="terminal-container">
        <div class="divider">====================================================</div>
        <div class="divider"> 📊 签售销量监控面板 </div>
        <div class="divider">====================================================</div>

        <!-- 双选择框：平台 + 刷新间隔 -->
        <div class="select-wrap">
            <div>
                <span class="info-text">选择平台：</span>
                <select id="platformSel">
                    <option value="ALL">全部平台</option>
                    <option value="ktown4u">ktown4u</option>
                    <option value="iminitv">iminitv</option>
                    <option value="fanme">fanme</option>
                    <option value="kmonstarorg">kmonstarorg</option>
                    <option value="kmonstatw">kmonstatw</option>
                    <option value="kmonstartw">kmonstartw</option>
                    <option value="itta">itta</option>
                    <option value="musicndrama">musicndrama</option>
                    <option value="beatroad">beatroad</option>
                    <option value="mokket">mokket</option>
                </select>
            </div>
            <div>
                <span class="info-text">刷新间隔：</span>
                <select id="refreshSel">
                    <option value="10000">10秒</option>
                    <option value="30000" selected>30秒</option>
                    <option value="60000">1分钟</option>
                </select>
            </div>
        </div>

        <div class="log-line"><span class="status">✅ 面板状态：</span>正常运行</div>
        <div class="log-line"><span class="info-text">🕒 最后更新：</span><span class="time-text" id="lastUpdate">--</span></div>

        <div class="divider">====================================================</div>
        <div class="info-text"> 签售销量数据列表 </div>
        <div class="divider">====================================================</div>

        <div id="logArea"></div>
    </div>

    <script>
        let allData = [];
        let refreshTimer = null;

        // 加载数据
        function loadCSV() {
            fetch('data.csv')
                .then(res => res.text())
                .then(text => {
                    allData = text.trim().split('\n');
                    renderData();
                    const now = new Date().toLocaleString();
                    document.getElementById('lastUpdate').textContent = now;
                })
                .catch(() => {
                    document.getElementById('logArea').innerHTML = 
                    '<div class="log-line" style="color:#ff6b6b;">⚠️ 读取数据失败，请检查data.csv文件</div>';
                });
        }

        // 渲染列表
        function renderData() {
            let sel = document.getElementById('platformSel').value;
            let area = document.getElementById('logArea');
            area.innerHTML = '';

            for(let i=1; i<allData.length; i++){
                let arr = allData[i].split(',');
                if(arr.length < 4) continue;

                let p = arr[0];
                let kind = arr[1];
                let sales = arr[2];
                let time = arr[3];

                if(sel !== 'ALL' && p !== sel) continue;

                let typeClass = kind === '线上团签' ? 'type-online' : 'type-offline';
                let line = `
                <div class="log-line">
                    <span class="platform-tag">[${p}]</span>
                    <span class="${typeClass}">${kind}</span>
                    销量：<span class="sales-high">${sales}</span>
                    记录时间：<span class="time-text">${time}</span>
                </div>
                `;
                area.innerHTML += line;
            }
        }

        // 设置自动刷新
        function setRefresh() {
            if(refreshTimer) clearInterval(refreshTimer);
            let gap = parseInt(document.getElementById('refreshSel').value);
            refreshTimer = setInterval(loadCSV, gap);
        }

        // 监听切换
        document.getElementById('platformSel').addEventListener('change', renderData);
        document.getElementById('refreshSel').addEventListener('change', setRefresh);

        // 初始化
        loadCSV();
        setRefresh();
    </script>
</body>
</html>
